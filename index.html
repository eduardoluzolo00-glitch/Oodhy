<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OODHY — The Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --black-2: #111111;
    --black-3: #1a1a1a;
    --black-4: #222222;
    --gold: #C9A84C;
    --gold-light: #E2C97E;
    --gold-dim: #8a6f2e;
    --gold-glow: rgba(201,168,76,0.15);
    --white: #f5f0e8;
    --white-dim: rgba(245,240,232,0.5);
    --white-faint: rgba(245,240,232,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Tenor Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: auto;
  }

  /* Custom cursor — desktop only */
  @media (pointer: fine) {
    body { cursor: none; }
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: all 0.18s ease;
      opacity: 0.6;
    }
  }
  @media (pointer: coarse) {
    .cursor, .cursor-ring { display: none; }
    button, textarea { cursor: auto; }
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Gold line top */
  .gold-line-top {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    background: var(--black);
    position: relative;
    z-index: 10;
    animation: fadeDown 0.8s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 40px; height: 40px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: rotateSlow 12s linear infinite;
  }

  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
  }

  .logo-mark span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--gold);
    animation: rotateSlow 12s linear infinite reverse;
  }

  .logo-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--white);
    line-height: 1;
  }

  .logo-text p {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
  }

  .btn-new {
    padding: 6px 16px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--gold);
    font-family: 'Tenor Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: none;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .btn-new:hover {
    background: var(--gold-glow);
    border-color: var(--gold);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 2px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* Welcome state */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    animation: fadeIn 1.2s ease both 0.3s;
    padding: 40px 20px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-symbol {
    width: 80px; height: 80px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    margin-bottom: 8px;
  }

  .welcome-symbol::before {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 50%;
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }

  .welcome-symbol-inner {
    width: 50px; height: 50px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--gold);
  }

  .welcome h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  .welcome p {
    font-size: 13px;
    color: var(--white-dim);
    line-height: 1.7;
    max-width: 300px;
  }

  .welcome-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 4px auto;
  }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    animation: msgIn 0.4s ease both;
    max-width: 100%;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    font-family: 'Cormorant Garamond', serif;
  }

  .msg.user .msg-avatar {
    background: var(--gold-glow);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
  }

  .msg.ai .msg-avatar {
    background: var(--white-faint);
    border: 1px solid rgba(245,240,232,0.1);
    color: var(--white-dim);
  }

  .msg-bubble {
    max-width: calc(100% - 50px);
    padding: 14px 18px;
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.75;
    letter-spacing: 0.01em;
  }

  .msg.user .msg-bubble {
    background: var(--gold-glow);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--white);
    border-radius: 2px 2px 0 2px;
  }

  .msg.ai .msg-bubble {
    background: var(--white-faint);
    border: 1px solid rgba(245,240,232,0.06);
    color: var(--white);
    border-radius: 2px 2px 2px 0;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: typingDot 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Memory badge */
  .memory-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    padding: 6px 12px;
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 20px;
    width: fit-content;
    margin: 0 auto;
    background: rgba(201,168,76,0.04);
    animation: fadeIn 0.6s ease both;
  }

  .memory-badge::before {
    content: '◈';
    color: var(--gold);
    font-size: 10px;
  }

  /* Input area */
  .input-area {
    border-top: 1px solid rgba(201,168,76,0.12);
    background: var(--black);
    padding: 12px 16px 20px;
    animation: fadeUp 0.8s ease both 0.2s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .input-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tab {
    padding: 5px 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--white-dim);
    font-family: 'Tenor Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    cursor: none;
    border-radius: 20px;
    transition: all 0.3s ease;
  }

  .tab.active {
    border-color: rgba(201,168,76,0.3);
    color: var(--gold);
    background: var(--gold-glow);
  }

  .tab:hover:not(.active) {
    color: var(--white);
    border-color: rgba(245,240,232,0.1);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--black-3);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    padding: 4px 4px 4px 16px;
    transition: border-color 0.3s ease;
  }

  .input-row:focus-within {
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.05);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Tenor Sans', sans-serif;
    font-size: 14px;
    letter-spacing: 0.02em;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    padding: 10px 0;
    line-height: 1.5;
  }

  textarea::placeholder {
    color: rgba(245,240,232,0.25);
  }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px;
  }

  .btn-icon {
    width: 36px; height: 36px;
    border: 1px solid rgba(201,168,76,0.15);
    background: transparent;
    color: var(--white-dim);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    transition: all 0.3s ease;
    font-size: 15px;
  }

  .btn-icon:hover {
    border-color: rgba(201,168,76,0.3);
    color: var(--gold);
    background: var(--gold-glow);
  }

  .btn-send {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    border-radius: 2px;
    color: var(--black);
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    transition: all 0.3s ease;
    font-size: 16px;
    flex-shrink: 0;
  }

  .btn-send:hover {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    transform: scale(1.05);
    box-shadow: 0 0 16px rgba(201,168,76,0.3);
  }

  .btn-send:active {
    transform: scale(0.97);
  }

  .powered-by {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.2);
    margin-top: 10px;
    text-transform: uppercase;
  }

  .powered-by span {
    color: rgba(201,168,76,0.4);
  }

  /* Gold corner decorations */
  .corner {
    position: fixed;
    width: 30px; height: 30px;
    pointer-events: none;
    z-index: 5;
    opacity: 0.3;
  }
  .corner-tl { top: 60px; left: 0; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 60px; right: 0; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 0; left: 0; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 0; right: 0; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* Memory panel */
  .memory-panel {
    position: fixed;
    top: 0; right: -280px;
    width: 280px;
    height: 100dvh;
    background: var(--black-2);
    border-left: 1px solid rgba(201,168,76,0.15);
    z-index: 100;
    transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }

  .memory-panel.open { right: 0; }

  .memory-panel-header {
    padding: 20px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .memory-panel-header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--gold);
  }

  .btn-close-panel {
    background: none;
    border: none;
    color: var(--white-dim);
    font-size: 18px;
    cursor: none;
    padding: 4px;
    transition: color 0.2s;
  }

  .btn-close-panel:hover { color: var(--white); }

  .memory-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .memory-item {
    padding: 10px 14px;
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 2px;
    background: var(--white-faint);
    font-size: 12px;
    color: var(--white-dim);
    line-height: 1.5;
    position: relative;
  }

  .memory-item::before {
    content: '◈';
    color: var(--gold-dim);
    font-size: 10px;
    margin-right: 6px;
  }

  .memory-empty {
    text-align: center;
    color: rgba(245,240,232,0.2);
    font-size: 12px;
    margin-top: 40px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Memory Panel -->
<div class="memory-panel" id="memoryPanel">
  <div class="memory-panel-header">
    <h3>◈ MEMÓRIA</h3>
    <button class="btn-close-panel" onclick="toggleMemory()">✕</button>
  </div>
  <div class="memory-list" id="memoryList">
    <div class="memory-empty">Nenhuma memória ainda.<br>Converse com a OODHY!</div>
  </div>
</div>

<!-- Gold shimmer line -->
<div class="gold-line-top"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-mark"><span>O</span></div>
    <div class="logo-text">
      <h1>OODHY</h1>
      <p>The Intelligence</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      ONLINE
    </div>
    <button class="btn-new" onclick="newChat()">+ NOVO</button>
    <button class="btn-icon" onclick="toggleMemory()" title="Memórias" style="font-size:13px; letter-spacing:0.05em; width:auto; padding:0 10px; font-family:'Tenor Sans',sans-serif; color: var(--gold-dim);">◈</button>
  </div>
</header>

<!-- Chat area -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="welcome-symbol">
      <div class="welcome-symbol-inner">O</div>
    </div>
    <h2>Olá, eu sou a OODHY</h2>
    <div class="welcome-divider"></div>
    <p>Inteligência refinada ao seu serviço. O que gostarias de explorar hoje?</p>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-tabs">
    <button class="tab active" id="tabChat" onclick="switchTab('chat')">◎ Chat</button>
    <button class="tab" id="tabImage" onclick="switchTab('image')">◈ Imagem</button>
  </div>
  <div class="input-row">
    <textarea id="inputMsg" placeholder="Escreve aqui..." rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <div class="input-actions">
      <button class="btn-icon" title="Anexar">＋</button>
      <button class="btn-icon" title="Áudio">🎤</button>
      <button class="btn-send" onclick="sendMessage()" title="Enviar">➤</button>
    </div>
  </div>
  <div class="powered-by">Oodhy Intelligence · Powered by <span>Groq AI</span></div>
</div>

<script>
  // ——— Cursor (desktop only) ———
  if (window.matchMedia('(pointer: fine)').matches) {
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx - 4 + 'px';
      cursor.style.top = my - 4 + 'px';
    });
    (function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx - 16 + 'px';
      ring.style.top = ry - 16 + 'px';
      requestAnimationFrame(animRing);
    })();
    document.querySelectorAll('button, textarea').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2.5)');
      el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
    });
  }

  // ——— State ———
  const GROQ_API_KEY = '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'; // Substitua pela sua chave
  let messages = [];
  let memories = JSON.parse(localStorage.getItem('oodhy_memories') || '[]');
  let activeTab = 'chat';

  // Load memories display
  renderMemories();

  // ——— Memory ———
  function toggleMemory() {
    document.getElementById('memoryPanel').classList.toggle('open');
  }

  function addMemory(text) {
    const mem = { text, time: new Date().toLocaleString('pt') };
    memories.unshift(mem);
    if (memories.length > 20) memories.pop();
    localStorage.setItem('oodhy_memories', JSON.stringify(memories));
    renderMemories();
  }

  function renderMemories() {
    const list = document.getElementById('memoryList');
    if (memories.length === 0) {
      list.innerHTML = '<div class="memory-empty">Nenhuma memória ainda.<br>Converse com a OODHY!</div>';
      return;
    }
    list.innerHTML = memories.map(m =>
      `<div class="memory-item">${m.text}<br><small style="opacity:0.4;font-size:10px;">${m.time}</small></div>`
    ).join('');
  }

  function buildSystemPrompt() {
    let sys = `Você é OODHY, uma inteligência artificial elegante, refinada e perspicaz. 
Sua personalidade é sofisticada mas acessível — como uma mentora brilhante.
Responda sempre em português. Seja concisa, direta e brilhante.
Evite frases genéricas. Cada resposta deve ter personalidade única.`;

    if (memories.length > 0) {
      sys += `\n\nMemórias do usuário:\n${memories.slice(0, 5).map(m => '- ' + m.text).join('\n')}`;
    }
    return sys;
  }

  // ——— Chat ———
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
    document.getElementById('tabImage').classList.toggle('active', tab === 'image');
    document.getElementById('inputMsg').placeholder = tab === 'chat'
      ? 'Escreve aqui...'
      : 'Descreve a imagem que queres criar...';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) { w.style.display = 'none'; }
  }

  function addMessage(role, text) {
    const area = document.getElementById('chatArea');
    removeWelcome();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'user' ? 'E' : 'O'}</div>
      <div class="msg-bubble">${text}</div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function addTyping() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">O</div>
      <div class="msg-bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addMemoryBadge(text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'memory-badge';
    div.textContent = text;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('inputMsg');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);

    // Save to conversation history
    messages.push({ role: 'user', content: text });

    addTyping();

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: 'llama3-70b-8192',
          messages: [
            { role: 'system', content: buildSystemPrompt() },
            ...messages.slice(-10) // Últimas 10 mensagens = memória de sessão
          ],
          max_tokens: 1024,
          temperature: 0.85
        })
      });

      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content || 'Desculpa, algo correu mal.';

      removeTyping();
      messages.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);

      // Auto-extract memory: save user message if it's personal info
      const personalKeywords = ['chamo', 'meu nome', 'tenho', 'anos', 'trabalho', 'sou', 'gosto', 'prefiro', 'vivo', 'moro'];
      if (personalKeywords.some(k => text.toLowerCase().includes(k)) && text.length < 200) {
        addMemory(text);
        addMemoryBadge('Memorizado ◈');
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', 'Erro de conexão. Verifica a tua chave de API.');
      console.error(err);
    }
  }

  function newChat() {
    messages = [];
    const area = document.getElementById('chatArea');
    area.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-symbol">
          <div class="welcome-symbol-inner">O</div>
        </div>
        <h2>Olá, eu sou a OODHY</h2>
        <div class="welcome-divider"></div>
        <p>Inteligência refinada ao seu serviço. O que gostarias de explorar hoje?</p>
      </div>
    `;
  }
</script>
</body>
</html>
